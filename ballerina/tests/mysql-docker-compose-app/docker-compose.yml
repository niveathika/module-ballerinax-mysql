services:
  mysql:
    container_name: ballerina-mysql
    image: mysql:8.0.40
    environment:
      MYSQL_ROOT_PASSWORD: Test123#
    volumes:
      - ./sql-scripts:/docker-entrypoint-initdb.d
      - ./keystore/server:/etc/ssl
      - ./my.cnf:/etc/my.cnf
    ports:
      - "3305:3306"
    networks:
      - mysql-network
    healthcheck:
        test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
        interval: 10s
        timeout: 5s
        retries: 5

